<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PSG</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #06060a;
      color: #fff;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
    }

    /* Nav */
    nav {
      padding: 24px 40px;
      position: absolute;
      top: 0; left: 0;
      z-index: 10;
    }
    nav .logo {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0.05em;
      color: #fff;
    }

    /* Hero */
    .hero {
      position: relative;
      width: 100%;
      height: 100vh;
      min-height: 480px;
      overflow: hidden;
    }
    .hero-bg {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at 70% 60%, rgba(255,120,30,0.35) 0%, transparent 50%),
        radial-gradient(ellipse at 85% 20%, rgba(20,100,220,0.4) 0%, transparent 40%),
        radial-gradient(ellipse at 10% 20%, rgba(10,60,160,0.6) 0%, transparent 50%),
        linear-gradient(160deg, #0a0820 0%, #060612 40%, #080a18 100%);
    }
    .hero-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, rgba(6,6,10,0.1) 0%, rgba(6,6,10,0.55) 100%);
    }
    .hero-content {
      position: relative;
      z-index: 2;
      height: 100%;
      padding-top: 72px;
    }

    /* Data bar */
    .data-bar {
      position: relative;
      z-index: 2;
      padding: 80px 40px 0;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
      max-width: 900px;
    }

    .widget-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.4);
      margin-bottom: 16px;
    }

    /* Weather */
    .weather-temp {
      font-size: 48px;
      font-weight: 300;
      color: #4a9eff;
      letter-spacing: -0.03em;
      line-height: 1;
    }
    .weather-condition {
      font-size: 13px;
      font-weight: 400;
      color: rgba(255,255,255,0.55);
      margin-top: 6px;
    }

    /* FTSE */
    .ftse-top {
      display: flex;
      align-items: baseline;
      gap: 12px;
      margin-bottom: 16px;
    }
    .ftse-price {
      font-size: 32px;
      font-weight: 300;
      color: #4a9eff;
      letter-spacing: -0.02em;
      line-height: 1;
    }
    .ftse-change {
      font-size: 13px;
      font-weight: 500;
    }
    .ftse-change.positive { color: #34d399; }
    .ftse-change.negative { color: #f87171; }
    .ftse-range {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.3);
      margin-top: 10px;
    }
    .ftse-chart {
      display: block;
      width: 100%;
      max-width: 320px;
      height: 60px;
    }
  </style>
</head>
<body>
  <nav>
    <span class="logo">PSG</span>
  </nav>

  <section class="hero">
    <div class="hero-bg"></div>
    <div class="hero-overlay"></div>
    <div class="hero-content">
      <div class="data-bar">
    <div id="weather-widget">
      <div class="widget-label">London Weather</div>
      <div class="weather-temp" id="weather-temp">—</div>
      <div class="weather-condition" id="weather-condition">Loading…</div>
    </div>

    <div id="ftse-widget">
      <div class="widget-label">FTSE 100</div>
      <div class="ftse-top">
        <span class="ftse-price" id="ftse-price">—</span>
        <span class="ftse-change" id="ftse-change"></span>
      </div>
      <svg class="ftse-chart" id="ftse-chart" viewBox="0 0 320 60" preserveAspectRatio="none">
        <polyline id="ftse-line" fill="none" stroke="#4a9eff" stroke-width="1.5"
          stroke-linejoin="round" stroke-linecap="round" points="" />
      </svg>
      <div class="ftse-range" id="ftse-range"></div>
    </div>
      </div>
    </div>
  </section>

  <script>
    async function loadWidgets() {
      const [weatherRes, ftseRes] = await Promise.all([
        fetch('/api/weather'),
        fetch('/api/ftse')
      ]);

      const weather = await weatherRes.json();
      document.getElementById('weather-temp').textContent = weather.temp.toFixed(1) + '°C';
      document.getElementById('weather-condition').textContent = weather.condition;

      const ftse = await ftseRes.json();
      const closes = ftse.closes;
      const last = closes[closes.length - 1];
      const first = closes[0];
      const pct = ((last - first) / first * 100).toFixed(2);
      const sign = pct >= 0 ? '+' : '';

      document.getElementById('ftse-price').textContent = last.toLocaleString('en-GB', { minimumFractionDigits: 2 });
      const changeEl = document.getElementById('ftse-change');
      changeEl.textContent = sign + pct + '%';
      changeEl.className = 'ftse-change ' + (pct >= 0 ? 'positive' : 'negative');
      document.getElementById('ftse-range').textContent = ftse.dateRange;

      // Draw sparkline
      const min = Math.min(...closes);
      const max = Math.max(...closes);
      const w = 320, h = 60, pad = 4;
      const points = closes.map((v, i) => {
        const x = closes.length === 1 ? w / 2 : (i / (closes.length - 1)) * (w - pad * 2) + pad;
        const y = h - pad - ((v - min) / (max - min || 1)) * (h - pad * 2);
        return `${x},${y}`;
      }).join(' ');
      document.getElementById('ftse-line').setAttribute('points', points);
    }

    loadWidgets();
  </script>
</body>
</html>
