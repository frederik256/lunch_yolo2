<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PSG</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #06060a;
      color: #fff;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
    }

    /* Nav */
    nav {
      padding: 24px 40px;
      position: absolute;
      top: 0; left: 0;
      z-index: 10;
    }
    nav .logo {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0.05em;
      color: #fff;
    }

    /* Hero */
    .hero {
      position: relative;
      width: 100%;
      height: 70vh;
      min-height: 480px;
      overflow: hidden;
    }
    .hero-bg {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at 70% 60%, rgba(255,120,30,0.35) 0%, transparent 50%),
        radial-gradient(ellipse at 20% 80%, rgba(30,200,180,0.3) 0%, transparent 45%),
        radial-gradient(ellipse at 85% 20%, rgba(20,100,220,0.4) 0%, transparent 40%),
        radial-gradient(ellipse at 10% 20%, rgba(10,60,160,0.6) 0%, transparent 50%),
        linear-gradient(160deg, #0a0820 0%, #060612 40%, #080a18 100%);
    }
    .hero-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, rgba(6,6,10,0.1) 0%, rgba(6,6,10,0.55) 100%);
    }
    .hero-content {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      text-align: center;
      padding: 0 24px;
      padding-top: 72px;
    }
    .hero-eyebrow {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.75);
      margin-bottom: 18px;
    }
    .hero-title {
      font-size: clamp(32px, 5vw, 58px);
      font-weight: 700;
      line-height: 1.15;
      letter-spacing: -0.01em;
      max-width: 680px;
      margin-bottom: 24px;
    }
    .hero-body {
      font-size: 14px;
      font-weight: 400;
      line-height: 1.7;
      color: rgba(255,255,255,0.8);
      max-width: 480px;
    }

    /* Stats */
    .stats {
      background: #06060a;
      padding: 64px 40px;
    }
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 48px 80px;
      max-width: 560px;
    }
    .stat-value {
      font-size: 36px;
      font-weight: 300;
      color: #4a9eff;
      letter-spacing: -0.02em;
      line-height: 1;
      margin-bottom: 6px;
    }
    .stat-label {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.55);
    }
  </style>
</head>
<body>
  <nav>
    <span class="logo">PSG</span>
  </nav>

  <section class="hero">
    <div class="hero-bg"></div>
    <div class="hero-overlay"></div>
    <div class="hero-content">
    </div>
  </section>

</body>
</html>
